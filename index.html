<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0b4c91">
    <meta
      name="description"
      content="Invitacion a la novena en memoria de la Sra. Nelly Ribera Robles."
    >
    <meta property="og:title" content="Novena - Sra. Nelly Ribera Robles">
    <meta
      property="og:description"
      content="Acompananos hoy a las 20:00 hrs via Google Meet."
    >
    <meta property="og:image" content="mami.png">
    <title>Novena - Sra. Nelly Ribera Robles</title>
    <link rel="preload" href="mami.png" as="image">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="invite-stage" aria-label="Invitacion a la novena">
        <div class="light light-one"></div>
        <div class="light light-two"></div>
        <div class="petal petal-one"></div>
        <div class="petal petal-two"></div>
        <div class="petal petal-three"></div>

        <div class="content">
          <p class="eyebrow">Invitacion a la novena</p>
          <h1>Sra. Nelly Ribera Robles</h1>
          <p class="lead">
            Con fe y esperanza nos reunimos hoy a las 20:00 hrs para elevar
            nuestras oraciones y acompanarla en memoria de nuestra amada.
          </p>

          <div class="actions" aria-label="Acciones de invitacion">
            <a
              class="meet-button"
              href="https://meet.google.com/"
              target="_blank"
              rel="noopener noreferrer"
            >
              Entrar por Google Meet
            </a>
            <p class="hint">Toca la invitacion o el boton para ingresar.</p>
          </div>
        </div>

        <a
          class="poster-link"
          href="https://meet.google.com/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Abrir Google Meet para la novena"
        >
          <img
            class="poster"
            src="mami.png"
            alt="Invitacion a la novena de la Sra. Nelly Ribera Robles, hoy a las 20:00 hrs via Google Meet."
          >
        </a>
      </section>
    </main>
  </body>
</html>
